<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Desktop Cat</title>
<style>
  body {
    margin: 0;
    overflow: hidden;
    background: transparent;
  }

  #cat {
    position: fixed;
    width: 120px;
    pointer-events: none;
  }
</style>
</head>
<body>

<img id="cat" src="walk1.png">

<script>
const cat = document.getElementById("cat");

const frames = ["walk1.png","walk2.png","walk3.png","walk4.png"];
let frameIndex = 0;

let x = -120;
let y = Math.random() * (window.innerHeight - 150);

let speed = 2;
let floatPhase = 0;

function animate() {

  // 切换帧
  frameIndex = (frameIndex + 1) % frames.length;
  cat.src = frames[frameIndex];

  // 向右移动
  x += speed;

  // 轻微上下浮动
  floatPhase += 0.1;
  let floatOffset = Math.sin(floatPhase) * 4;

  cat.style.left = x + "px";
  cat.style.top = (y + floatOffset) + "px";

  // 走出屏幕后重置
  if (x > window.innerWidth) {
    x = -120;
    y = Math.random() * (window.innerHeight - 150);
  }
}

setInterval(animate, 120);
</script>

</body>
</html>
