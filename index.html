<!doctype html>
<html lang="zh">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Desktop Cat</title>
  <style>
    html,body{height:100%;margin:0;background:#fff;overflow:hidden;}
    /* 固定一个“画布盒子”，避免换帧时尺寸变化导致抖动 */
    #catBox{
      position:fixed;
      left:24px;
      bottom:24px;
      width:220px;          /* 你可以改大改小 */
      height:220px;
      pointer-events:none;  /* 不挡你点网页 */
      overflow:visible;
    }
    /* 关键：底部对齐 + 居中 */
    #cat{
      position:absolute;
      left:50%;
      bottom:0;
      transform:translateX(-50%);
      width:220px;
      height:auto;
      user-select:none;
      -webkit-user-drag:none;
      image-rendering:auto;
    }
  </style>
</head>
<body>
  <div id="catBox"><img id="cat" alt="cat"/></div>

  <script>
    // 1) 帧图片
    const frames = ["walk1.png","walk2.png","walk3.png","walk4.png"];

    // 2) 预加载（避免切帧闪烁）
    frames.forEach(src => { const i = new Image(); i.src = src; });

    const cat = document.getElementById("cat");
    const catBox = document.getElementById("catBox");

    // 3) 设置初始帧
    let fi = 0;
    cat.src = frames[0];

    // 4) 切帧速度（越小越快）
    const frameMs = 120;
    setInterval(() => {
      fi = (fi + 1) % frames.length;
      cat.src = frames[fi];
    }, frameMs);

    // 5) 随机走动（你最开始要的“在桌面上活动”）
    let x = 24, y = 24;         // 以 left/bottom 表示位置
    let vx = 1;                 // 水平速度
    const speed = 1.2;          // 越大走得越快
    function tick(){
      const maxX = window.innerWidth - catBox.offsetWidth - 24;
      x += vx * speed;

      if (x <= 24){ x = 24; vx = 1; }
      if (x >= maxX){ x = maxX; vx = -1; }

      catBox.style.left = x + "px";
      // 小猫始终贴底：bottom 固定
      // catBox.style.bottom = y + "px";

      requestAnimationFrame(tick);
    }
    tick();
  </script>
</body>
</html>
