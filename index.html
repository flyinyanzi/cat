<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Desktop Cat (Web)</title>
  <style>
    html, body { margin: 0; height: 100%; overflow: hidden; background: transparent; }
    #stage { position: fixed; inset: 0; pointer-events: none; }

    #cat {
      position: absolute;
      width: 180px;           /* 可调：猫显示大小 */
      height: auto;
      image-rendering: auto;
      user-select: none;
      -webkit-user-drag: none;
      pointer-events: none;
      will-change: transform, left, top;
    }

    #panel {
      position: fixed;
      top: 20px;
      right: 20px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      font-family: sans-serif;
    }

    #panel input {
      width: 80px;
      padding: 4px;
    }

    #panel button {
      padding: 4px;
      cursor: pointer;
    }

    #timer {
      position: fixed;
      top: 20px;
      right: 20px;
      font-size: 22px;
      font-family: monospace;
      color: #333;
      pointer-events: none;
    }
    
    #fx{
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }
    #fx .msg{
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%,-50%);
      font-size: 40px;
      font-family: "PingFang SC","Microsoft YaHei",sans-serif;
      color: rgba(20,20,20,.85);
      text-shadow: 0 2px 10px rgba(0,0,0,.08);
      opacity: 0;
      animation: msgIn .25s ease-out forwards;
    }
    @keyframes msgIn{
      to{ opacity: 1; transform: translate(-50%,-50%) scale(1); }
    }
    #fx .confetti{
      position:absolute;
      width:8px;
      height:14px;
      border-radius:2px;
      opacity:.9;
      animation: fall 1.8s linear forwards;
    }
    @keyframes fall{
      from{ transform: translate3d(0,-30px,0) rotate(0deg); opacity: 1; }
      to  { transform: translate3d(0,680px,0) rotate(540deg); opacity: 0; }
    }

  </style>
</head>
<body>
  <div id="stage">
    <img id="cat" alt="cat" />
  </div>

  <div id="panel">
    <input id="minuteInput" type="number" min="1" max="99" placeholder="分钟" />
    <button id="startBtn">开始</button>
    <button id="resetBtn">重置</button>
    <div id="timer">00:00</div>
  </div>

  <div id="fx"></div>

  <script>
    /********************
     * 1) 动作定义（后续扩展都在这里加）
     ********************/
    const ACTIONS = {
      walk: {
        key: "walk",
        frames: ["walk1.png", "walk2.png", "walk3.png", "walk4.png"],
        fps: 10,
        loop: true,
        move: { vx: -120, vy: 0 },
      },

      pounce: {
        key: "pounce",
        frames: ["pounce1.png", "pounce2.png", "pounce3.png", "pounce4.png"],
        fps: 12,
        loop: false,
        move: null
      },

      sleep: {
        key: "sleep",
        frames: ["sleep1.png", "sleep2.png", "sleep3.png", "sleep4.png"],
        fps: 6,
        loop: false,
        move: null
      }
    };

    /********************
     * 2) 简单工具：预加载
     ********************/
    function preloadImages(urls) {
      return Promise.all(urls.map(u => new Promise((res, rej) => {
        const img = new Image();
        img.onload = () => res(u);
        img.onerror = () => rej(new Error("Failed to load: " + u));
        img.src = u;
      })));
    }

    function weightedPick(actionsMap) {
      const arr = Object.values(actionsMap);
      const total = arr.reduce((s, a) => s + (a.weight ?? 1), 0);
      let r = Math.random() * total;
      for (const a of arr) {
        r -= (a.weight ?? 1);
        if (r <= 0) return a;
      }
      return arr[arr.length - 1];
    }

    /********************
     * 3) 猫实体（动作切换 + 帧动画 + 位移）
     ********************/
class Cat {
  constructor(el) {
    this.el = el;

    this.width = 180;

    this.x = window.innerWidth + 50;
    this.y = this.randomY();

    this.action = null;
    this.frameIndex = 0;
    this.frameTimer = 0;

    this.state = "walk";  // walk | pounce | rest
    this.stateTimer = 0;

    this.walkDuration = this.randomWalkDuration();
    this.restDuration = 0;

    // 呼吸感
    this.breathPhase = 0;

    // 逗猫
    this.mouseX = 0;
    this.mouseY = 0;
    this.isMouseNear = false;

    this.setAction(ACTIONS.walk);
    this.applyPosition();

    // 互动冷却
    this.interactCooldown = 0;
    this.pounceCooldownUntil = 0; // 所有“扑”的统一冷却

    // 长时间挂机
    this.lastInteractionTime = Date.now();

    // 工作模式判断
    this.isWorkMode = false;
    
    this.script = null;          // { type, t, phase, ... }
    this.prevStateBeforeScript = null;
  }

  randomY() {
    const h = window.innerHeight;
    const bottomSafe = 120;
    const min = h * 0.2;
    const max = Math.max(min + 10, h - bottomSafe); // 防止窗口太小 max < min
    return min + Math.random() * (max - min);
  }

  randomWalkDuration() {
    return 2000 + Math.random() * 3000; // 2~5 秒
  }

  randomRestDuration() {
    const r = Math.random();
    if (r < 0.3) return 4000 + Math.random() * 4000; // 4~8 秒
    return 1500 + Math.random() * 2500;              // 1.5~4 秒
  }

  setAction(action) {
    this.action = action;
    this.frameIndex = 0;
    this.frameTimer = 0;
    this.el.src = action.frames[0];
  }

  startPounce() {
    const now = Date.now();
    if (now < this.pounceCooldownUntil) return false;

    this.state = "pounce";
    this.stateTimer = 0;
    this.setAction(ACTIONS.pounce);
    this.pounceCooldownUntil = now + 5000; // 5秒内不允许再次扑
    return true;
  }

  update(dt) {
    if (this.interactCooldown > 0) {
      this.interactCooldown -= dt * 1000;
    }

    // ===== 脚本模式：倒计时结束演出（最高优先级）=====
    if (this.script) {
      this.runScript(dt);
      this.applyPosition(dt);
      return; // 直接跳过后面的正常状态机
    }

    // ===== 长时间待机（最高优先级） =====
    if (document.visibilityState === "visible") {
      const idleDuration = Date.now() - this.lastInteractionTime;

      if (idleDuration > 60000 && this.state !== "sleep") {
        // 如果已经快出屏，先重生
        if (this.x < -this.width + 2) {
          this.x = window.innerWidth + 50;
          this.y = this.randomY();
        }
        
        this.state = "sleep";
        this.stateTimer = 0;
        this.setAction(ACTIONS.sleep);
      }
    }
    
    // 1) 帧动画
    const frameDuration = 1 / (this.action.fps || 8);
    this.frameTimer += dt;

    while (this.frameTimer >= frameDuration) {
      this.frameTimer -= frameDuration;
      this.frameIndex++;

      if (this.frameIndex >= this.action.frames.length) {
        this.frameIndex = this.action.loop ? 0 : (this.action.frames.length - 1);
      }

      this.el.src = this.action.frames[this.frameIndex];
    }

    // 2) 计时
    this.stateTimer += dt * 1000;

    // 3) 鼠标距离检测
    const dx = this.mouseX - (this.x + 90);
    const dy = this.mouseY - (this.y + 60);
    const dist = Math.hypot(dx, dy);
    this.isMouseNear = dist < 120;

    // 4) 鼠标逗猫逻辑
    if (
      this.isMouseNear &&
      dx < 0 &&
      this.state === "walk" &&
      this.interactCooldown <= 0
    ) {
      if (Math.random() < 0.15) {
        this.startPounce();          // ✅ 统一走这里
        this.interactCooldown = 3000; // 鼠标这条路自己的节流还保留interactCooldown = 3000，3秒冷却
      }
    }

    // 5) 状态机
    switch (this.state) {
      case "walk": {
        // 防御：避免 this.action.move 为 null 时崩
        if (this.action.move) this.x += this.action.move.vx * dt;

        if (this.stateTimer > this.walkDuration) {
          const sleepChance = this.isWorkMode ? 0.4 : 1.0;

          if (Math.random() < sleepChance) {
            // ✅ 自动触发也走统一冷却
            this.startPounce();
          } else {
            // 不睡：继续走
            this.walkDuration = this.randomWalkDuration();
            this.stateTimer = 0;
          }
          // 不管睡不睡，都重置计时，避免立刻连触发
          this.stateTimer = 0;
        }
        break;
      }

      case "pounce": {
        const lastFrame = this.action.frames.length - 1;
        if (this.frameIndex === lastFrame) {
          this.state = "rest";
          this.stateTimer = 0;
          this.restDuration = this.randomRestDuration();
        }
        break;
      }

      case "rest": {
        if (this.stateTimer > this.restDuration) {
          this.state = "walk";
          this.stateTimer = 0;
          this.walkDuration = this.randomWalkDuration();
          this.setAction(ACTIONS.walk);
        }
        break;
      }

      case "sleep": {
        const lastFrame = this.action.frames.length - 1;
        // 播到最后一帧后固定住
        if (this.frameIndex >= lastFrame) {
          this.frameIndex = lastFrame;
        }
        break;
      }
    }

    // 6) 出屏重生（只处理左侧出屏，避免出生就被判出屏）
    if (this.x < -this.width) {
      this.x = window.innerWidth + 50;
      this.y = this.randomY();

      this.state = "walk";
      this.stateTimer = 0;
      this.walkDuration = this.randomWalkDuration();
      this.setAction(ACTIONS.walk);
    }

    // 7) 应用位置 + 呼吸（这里统一做 transform，避免互相覆盖）
    this.applyPosition(dt);
  }

  runScript(dt) {
    const s = this.script;
    s.t += dt * 1000;

    // phase 0: 走向目标点（文字左边）
    if (s.phase === 0) {
      // 强制 walk 动画
      if (this.state !== "walk") {
        this.state = "walk";
        this.stateTimer = 0;
        this.setAction(ACTIONS.walk);
      }

      // 只在脚本中移动
      this.x += s.vx * dt;

      // 到达目标点：切到扑倒
      if (this.x <= s.targetX) {
        this.x = s.targetX;
        this.state = "pounce";
        this.stateTimer = 0;
        this.setAction(ACTIONS.pounce);
        s.phase = 1;
        s.t = 0;
      }
      return;
    }

    // phase 1: 扑倒播放完成后保持不动等待结束
    if (s.phase === 1) {
      // pounce 结束后，停在最后一帧（你的状态机里本来会转 rest，我们这里不让它转）
      const last = this.action.frames.length - 1;
      if (this.frameIndex >= last) this.frameIndex = last;

      // 等脚本结束时间到（由外部调用 stopScript）
      return;
    }
  }

  applyPosition(dt = 0) {
    let extra = "";

    // 呼吸
    if (this.state === "rest" || this.state === "sleep") {
      this.breathPhase += dt * 2;
      const scaleY = 1 + Math.sin(this.breathPhase) * 0.025;
      extra = ` scaleY(${scaleY})`;
    }

    this.el.style.transform = `translate(${this.x}px, ${this.y}px)${extra}`;
  }
}

    /********************
     * 4) 启动
     ********************/
    (async function main() {
      const allFrames = Object.values(ACTIONS).flatMap(a => a.frames);
      try {
        await preloadImages(allFrames);
      } catch (e) {
        console.error(e);
        alert("图片加载失败：\n" + e.message + "\n\n请确认 walk1.png~walk4.png 与 HTML 同目录。");
        return;
      }

      const catEl = document.getElementById("cat");
      const cat = new Cat(catEl);

      /********************
       * 可控计时器
       ********************/
      let timer = 0;
      let intervalId = null;
      let isRunning = false;

      const minuteInput = document.getElementById("minuteInput");
      const startBtn = document.getElementById("startBtn");
      const resetBtn = document.getElementById("resetBtn");
      const timerEl = document.getElementById("timer");

      updateDisplay();

      // 开始按钮
      startBtn.addEventListener("click", () => {
        if (isRunning) return;

        const minutes = parseInt(minuteInput.value);

        if (isNaN(minutes) || minutes <= 0) {
          alert("请输入有效分钟数");
          return;
        }

        timer = minutes * 60;
        isRunning = true;
        updateDisplay();
        cat.isWorkMode = true;

        intervalId = setInterval(() => {
          timer--;

          if (timer <= 0) {
            clearInterval(intervalId);
            isRunning = false;
            cat.isWorkMode = false;
            timer = 0;
            updateDisplay();

            // 时间到 → 猫扑倒，辛苦啦彩带
            playCongrats();
            return;
          }
          updateDisplay();
        }, 1000);
      });

      // 重置按钮
      resetBtn.addEventListener("click", () => {
        clearInterval(intervalId);
        isRunning = false;
        timer = 0;
        updateDisplay();
        cat.isWorkMode = false;
      });

      // 显示函数
      function updateDisplay() {
        const min = Math.floor(timer / 60).toString().padStart(2, "0");
        const sec = (timer % 60).toString().padStart(2, "0");

        timerEl.textContent = `${min}:${sec}`;
      }

      let last = performance.now();
      function tick(now) {
        const dt = Math.min(0.05, (now - last) / 1000); // 防卡顿爆走
        last = now;
        cat.update(dt);
        requestAnimationFrame(tick);
      }
      requestAnimationFrame(tick);

      window.addEventListener("resize", () => {
        // 不强制重置位置，只确保不会 NaN
        cat.x = Math.min(cat.x, window.innerWidth + 50);
      });

function playCongrats() {
  const fx = document.getElementById("fx");
  fx.innerHTML = ""; // 清理旧特效（避免连触发）

  // 1) 文字
  const msg = document.createElement("div");
  msg.className = "msg";
  msg.textContent = "辛苦啦";
  fx.appendChild(msg);

  // 2) 彩带（零星彩带：用小纸片模拟）
  const W = window.innerWidth;
  const H = window.innerHeight;

  // 文字大概在正中间，我们从上方散落
  const centerX = W * 0.5;
  for (let i = 0; i < 90; i++) {
    const c = document.createElement("div");
    c.className = "confetti";

    // 从中间附近散开
    const x = centerX + (Math.random() - 0.5) * 420;
    const y = -20 - Math.random() * 120;

    c.style.left = `${x}px`;
    c.style.top = `${y}px`;
    c.style.background = `hsl(${Math.floor(Math.random()*360)} 85% 60%)`;
    c.style.animationDelay = `${Math.random() * 0.4}s`;
    c.style.transform = `rotate(${Math.random()*180}deg)`;

    fx.appendChild(c);
  }

  // 3) 猫脚本：从右侧走到文字左边，然后扑倒
  //    如果当时在 sleep/rest/pounce，都强制醒来接管
  cat.prevStateBeforeScript = cat.state;

  // 把猫放到“舞台”右侧外面，y 对齐文字附近（稍微偏下更像站在字旁边）
  const targetY = H * 0.55 + 30;        // 你可以调
  cat.y = Math.max(H * 0.2, Math.min(targetY, H - 140));
  cat.x = W + 60;

  const targetX = W * 0.5 - 220;        // “文字左边”位置（你可以调 -220 这个距离）
  cat.script = {
    type: "congrats",
    phase: 0,
    t: 0,
    vx: -420,        // 走过速度（px/s），你可以调快慢
    targetX
  };

  // 4) 5 秒后收场：清除 fx，退出脚本，恢复正常
  setTimeout(() => {
    fx.innerHTML = "";

    // 退出脚本，恢复正常走路（不恢复 sleep，避免又睡死）
    cat.script = null;
    cat.state = "walk";
    cat.stateTimer = 0;
    cat.walkDuration = cat.randomWalkDuration();
    cat.setAction(ACTIONS.walk);
  }, 5000);
}

      // 鼠标逗猫监听
      window.addEventListener("mousemove", e => {
        cat.mouseX = e.clientX;
        cat.mouseY = e.clientY;
        cat.lastInteractionTime = Date.now();
        if (cat.state === "sleep") {
          cat.state = "walk";
          cat.stateTimer = 0;
          cat.setAction(ACTIONS.walk);
        }
      });

      // 手指触屏逗猫监听
      window.addEventListener("touchmove", e => {
        const touch = e.touches[0];
        cat.mouseX = touch.clientX;
        cat.mouseY = touch.clientY;
        cat.lastInteractionTime = Date.now();
        if (cat.state === "sleep") {
          cat.state = "walk";
          cat.stateTimer = 0;
          cat.setAction(ACTIONS.walk);
        }
      });
      
    })();

  </script>
</body>
</html>
